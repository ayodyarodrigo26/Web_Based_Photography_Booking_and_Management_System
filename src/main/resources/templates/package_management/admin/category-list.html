<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Admin - Categories</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --vintage-bg: #fdf7f2;
            --vintage-surface: #f7ebe2;
            --vintage-surface-soft: #fbf1e9;
            --vintage-primary: #b46b4e;
            --vintage-primary-soft: #e3b7a0;
            --vintage-accent: #d0a36f;
            --vintage-dark: #3b2a2a;
            --vintage-muted: #7b6a5d;
        }

        body {
            background-color: var(--vintage-bg) !important;
            font-family: 'Lora', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--vintage-dark);
        }

        .navbar {
            background: linear-gradient(135deg, #3b2a2a, #5a3c35) !important;
            border-bottom: 3px solid rgba(255, 255, 255, 0.08);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.04em;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .card {
            border: 0;
            border-radius: 18px;
            background: var(--vintage-surface);
            box-shadow: 0 14px 30px rgba(43, 28, 25, 0.18);
        }

        .btn {
            border-radius: 999px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .btn-primary {
            background-color: var(--vintage-primary);
            border-color: var(--vintage-primary);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: #9e5f46;
            border-color: #9e5f46;
        }

        .btn-outline-danger {
            border-radius: 999px;
        }

        .table {
            background-color: var(--vintage-surface-soft);
        }

        .table thead {
            background-color: #3b2a2a;
            color: #fdf7f2;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(212, 178, 145, 0.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Photography Admin</span>
        <a class="btn btn-light btn-sm" th:href="@{/admin/packages}">Packages</a>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="page-title mb-0">Package Categories</h2>
        <a class="btn btn-primary" th:href="@{/admin/categories/create}">+ Create Category</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th style="width: 320px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${categories}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.description}"></td>
                        <td>
                            <a class="btn btn-sm btn-primary me-2"
                               th:href="@{/admin/packages/create(category=${c.name})}">+ Add Package</a>
                            <a class="btn btn-sm btn-outline-primary me-2"
                               th:href="@{/admin/categories/{id}/packages(id=${c.id})}">View Packages</a>
                            <a class="btn btn-sm btn-outline-secondary me-2"
                               th:href="@{/admin/categories/edit/{id}(id=${c.id})}">Edit</a>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    th:onclick="|openDeleteModal(${c.id})|">
                                Delete
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>
    let deleteId = null;

    function openDeleteModal(id) {
        deleteId = id;
        document.getElementById("deleteModal").style.display = "flex";
    }

    function closeDeleteModal() {
        document.getElementById("deleteModal").style.display = "none";
    }

    // ✅ ADD THIS FUNCTION
    function confirmDelete() {
        if (deleteId) {
            window.location.href = "/admin/categories/delete/" + deleteId;
        }
    }
</script>

<!-- DELETE MODAL -->
<div id="deleteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background: rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">

    <div style="background:white; padding:25px; border-radius:12px; width:350px; text-align:center;
                border-top:5px solid red; box-shadow:0 10px 30px rgba(0,0,0,0.3);">

        <h3 style="color:red;">⚠ Confirm Deletion</h3>
        <p>Are you sure you want to delete this category?</p>

        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn btn-danger" onclick="confirmDelete()">Yes, Delete</button>
        </div>
    </div>
</div>
</body>
</html>
