<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Create Package</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <!-- Bootstrap 5 (UI only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Vintage-inspired typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --vintage-bg: #fdf7f2;
            --vintage-surface: #f7ebe2;
            --vintage-surface-soft: #fbf1e9;
            --vintage-primary: #b46b4e;
            --vintage-primary-soft: #e3b7a0;
            --vintage-accent: #d0a36f;
            --vintage-dark: #3b2a2a;
            --vintage-muted: #7b6a5d;
        }

        body {
            background-color: var(--vintage-bg) !important;
            font-family: 'Lora', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--vintage-dark);
        }

        .navbar {
            background: linear-gradient(135deg, #3b2a2a, #5a3c35) !important;
            border-bottom: 3px solid rgba(255, 255, 255, 0.08);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.04em;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .card {
            border: 0;
            border-radius: 18px;
            background: var(--vintage-surface);
            box-shadow: 0 14px 30px rgba(43, 28, 25, 0.18);
        }

        .form-control, .form-select {
            border-radius: 12px;
        }

        .btn {
            border-radius: 999px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .btn-primary {
            background-color: var(--vintage-primary);
            border-color: var(--vintage-primary);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: #9e5f46;
            border-color: #9e5f46;
        }

        .btn-outline-secondary {
            color: var(--vintage-dark);
            border-color: var(--vintage-muted);
        }

        .btn-outline-secondary:hover,
        .btn-outline-secondary:focus {
            background-color: var(--vintage-surface-soft);
        }

        .alert-success {
            background-color: #e3f5e3;
            border-color: #c0e5c0;
            color: #335533;
        }
    </style>
</head>
<body>

<!-- Top bar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Photography Admin</span>
    </div>
</nav>

<div class="container py-4" style="max-width: 820px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="page-title mb-0">Create Photography Package</h2>
        <a class="btn btn-outline-secondary" th:href="@{/admin/packages}">Back to List</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <form th:action="@{/admin/packages/create}" th:object="${pkg}" method="post">

                <div class="mb-3">
                    <label class="form-label">Package Name</label>
                    <input type="text" class="form-control" placeholder="e.g., Wedding Gold Package" th:field="*{name}" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="3" placeholder="Write package details..." th:field="*{description}"></textarea>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Includes</label>
                    <textarea class="form-control" rows="3"
                              placeholder="Ex: 1 Photographer, 4 Hours, 150 Edited Photos, Soft Copy Delivery"
                              th:field="*{includes}"></textarea>
                    <small class="text-muted">Tip: Separate items with commas or new lines.</small>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Price (LKR)</label>
                        <input type="number" class="form-control" placeholder="25000" step="0.01" th:field="*{price}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <select class="form-select" th:field="*{category}" required>
                            <option value="" th:if="${#lists.isEmpty(categories)}">No categories yet — create one first</option>
                            <option value="" th:if="${!#lists.isEmpty(categories)}">Select category...</option>
                            <option th:each="c : ${categories}" th:value="${c.name}" th:text="${c.name}"></option>
                        </select>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('category')}"
                             th:errors="*{category}">
                        </div>
                        <div th:if="${#lists.isEmpty(categories)}" class="small mt-1">
                            <a th:href="@{/admin/categories/create}">+ Create category</a>
                        </div>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Save Package</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/packages}">Cancel</a>
                </div>

            </form>

        </div>
    </div>

    <p class="text-muted small mt-3 mb-0">
        Tip: Fill all fields before saving.
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
