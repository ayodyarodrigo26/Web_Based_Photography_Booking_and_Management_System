<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Edit Category</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --vintage-bg: #fdf7f2;
            --vintage-surface: #f7ebe2;
            --vintage-surface-soft: #fbf1e9;
            --vintage-primary: #b46b4e;
            --vintage-primary-soft: #e3b7a0;
            --vintage-accent: #d0a36f;
            --vintage-dark: #3b2a2a;
            --vintage-muted: #7b6a5d;
        }

        body {
            background-color: var(--vintage-bg) !important;
            font-family: 'Lora', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--vintage-dark);
        }

        .navbar {
            background: linear-gradient(135deg, #3b2a2a, #5a3c35) !important;
            border-bottom: 3px solid rgba(255, 255, 255, 0.08);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.04em;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .card {
            border: 0;
            border-radius: 18px;
            background: var(--vintage-surface);
            box-shadow: 0 14px 30px rgba(43, 28, 25, 0.18);
        }

        .form-control {
            border-radius: 12px;
        }

        .btn {
            border-radius: 999px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .btn-success {
            background-color: var(--vintage-primary);
            border-color: var(--vintage-primary);
        }

        .btn-success:hover,
        .btn-success:focus {
            background-color: #9e5f46;
            border-color: #9e5f46;
        }

        .btn-outline-secondary {
            color: var(--vintage-dark);
            border-color: var(--vintage-muted);
        }

        .btn-outline-secondary:hover,
        .btn-outline-secondary:focus {
            background-color: var(--vintage-surface-soft);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Photography Admin</span>
    </div>
</nav>

<div class="container py-4" style="max-width: 720px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="page-title mb-0">Edit Category</h2>
        <a class="btn btn-outline-secondary" th:href="@{/admin/categories}">Back to List</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <form th:action="@{/admin/categories/edit}" th:object="${category}" method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Category Name</label>
                    <input type="text" class="form-control" th:field="*{name}"/>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description (optional)</label>
                    <input type="text" class="form-control" th:field="*{description}"/>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">Update Category</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/categories}">Cancel</a>
                </div>

            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
