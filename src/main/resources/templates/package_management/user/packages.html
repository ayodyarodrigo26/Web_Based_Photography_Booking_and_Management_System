<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Packages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --vintage-bg: #fdf7f2;
            --vintage-surface: #f7ebe2;
            --vintage-surface-soft: #fbf1e9;
            --vintage-primary: #b46b4e;
            --vintage-primary-soft: #e3b7a0;
            --vintage-accent: #d0a36f;
            --vintage-dark: #3b2a2a;
            --vintage-muted: #7b6a5d;
        }

        body {
            background-image: url("https://images.pexels.com/photos/16813427/pexels-photo-16813427.jpeg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Lora', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--vintage-dark);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                    rgba(253,247,242,0.50),
                    rgba(253,247,242,0.50)
            );
            z-index: -1;
        }

        .navbar {
            background: linear-gradient(135deg, #3b2a2a, #5a3c35) !important;
            border-bottom: 3px solid rgba(255, 255, 255, 0.08);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.04em;
        }

        .card {
            border: 0;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            box-shadow: 0 14px 30px rgba(43, 28, 25, 0.18);
        }

        .btn {
            border-radius: 999px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .btn-primary{
            background: #2b1f1f !important;
            color: #fdf7f2 !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 12px !important;
            padding: 12px 18px !important;
            font-weight: 700 !important;
            text-transform: none !important;
            letter-spacing: 0.02em !important;
            box-shadow: 0 10px 18px rgba(43,28,25,0.28) !important;
        }

        .btn-primary:hover{
            background: #3b2a2a !important;
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, #c79b63, #b07a44) !important;
            color: #fff !important;
            border: none !important;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            transition: all 0.25s ease;
        }

        .btn-success:hover,
        .btn-success:focus {
            background: linear-gradient(135deg, #b9864e, #9f6a3b) !important;
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.22);
        }

        .btn-light {
            background-color: var(--vintage-surface-soft);
            border-color: transparent;
            color: var(--vintage-dark);
        }

        .btn-light:hover {
            background-color: #f3e2d5;
        }

        .table {
            background-color: var(--vintage-surface-soft);
        }

        .table-dark {
            background-color: #3b2a2a !important;
        }

        .table-dark th {
            color: #fdf7f2 !important;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(212, 178, 145, 0.2);
        }

        .container { max-width: 1100px; }

        .table-responsive {
            background: transparent !important;
            border-radius: 18px;
        }

        table.table {
            border-collapse: separate !important;
            border-spacing: 0 16px;
            background: transparent !important;
        }

        .table thead th {
            background: #2b1f1f !important;
            color: #fdf7f2 !important;
            border: 0 !important;
            padding: 16px 16px !important;
        }

        .table thead th:first-child { border-top-left-radius: 14px; }
        .table thead th:last-child  { border-top-right-radius: 14px; }

        .table tbody tr {
            background: var(--vintage-surface) !important;
            box-shadow: 0 14px 30px rgba(43, 28, 25, 0.16);
            border-radius: 18px;
            overflow: hidden;
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .table tbody tr:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(43, 28, 25, 0.22);
        }

        .table tbody td {
            border: 0 !important;
            padding: 18px 16px !important;
            vertical-align: middle !important;
        }

        .table tbody tr td:first-child {
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
        }

        .table tbody tr td:last-child {
            border-top-right-radius: 18px;
            border-bottom-right-radius: 18px;
        }

        .table tbody td:first-child {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
        }

        .table tbody td:nth-child(2) {
            color: var(--vintage-muted);
            font-weight: 600;
        }

        .table tbody td:nth-child(3){
            font-size: 15px;
            line-height: 1.8;
            color: rgba(59,42,42,0.75);
        }

        .package-includes{
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .package-includes li{
            position: relative;
            padding-left: 1.4rem;
            margin-bottom: 0.2rem;
            color: var(--vintage-muted);
        }

        .package-includes li::before{
            content: "✓";
            position: absolute;
            left: 0;
            top: 0;
            color: var(--vintage-primary);
            font-weight: 700;
        }

        .table tbody td:nth-child(4),
        .table tbody td.text-end {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        .table tbody td:last-child .btn-success{
            background-color: var(--vintage-accent) !important;
            border-color: var(--vintage-accent) !important;
            color: #2b1f1f !important;
            border-radius: 999px !important;
            padding: 8px 14px !important;
            font-weight: 700 !important;
            box-shadow: 0 10px 18px rgba(43,28,25,0.15) !important;
        }

        .table tbody td:last-child .btn-success:hover{
            background-color: #b9864e !important;
            border-color: #b9864e !important;
        }

        .table tbody td:nth-child(2){
            background: transparent !important;
            color: #7b6a5d !important;
            font-weight: 600 !important;
            border: none !important;
            display: table-cell !important;
            padding: 18px 16px !important;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-title {
            color: var(--vintage-dark);
            font-weight: 600;
            margin: 0;
        }

        .filter-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-select {
            min-width: 240px;
            border-radius: 12px;
            border: 1px solid rgba(59, 42, 42, 0.15);
            padding: 10px 14px;
            background: rgba(255,255,255,0.85);
            color: var(--vintage-dark);
        }

        .empty-message {
            text-align: center;
            padding: 28px 16px !important;
            color: var(--vintage-muted);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            table.table { border-spacing: 0 12px; }
            .table thead { display: none; }
            .table tbody td { display: block; width: 100%; }
            .table tbody tr td:nth-child(2) { margin-top: 8px; }
            .table tbody tr td:last-child { margin-top: 12px; text-align: left !important; }
            .filter-select { min-width: 100%; }
        }

        .table tbody tr:nth-child(3){
            border: 2px solid #c79b63;
            box-shadow: 0 10px 30px rgba(199,155,99,0.25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Packages</span>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" th:href="@{/}">Home</a>
            <a class="btn btn-light btn-sm" th:href="@{/offers}">Offers</a>
            <a class="btn btn-light btn-sm" th:href="@{/coupon-codes}">Coupons</a>

            <a class="btn btn-light btn-sm me-2"
               sec:authorize="hasRole('CUSTOMER')"
               th:href="@{/user/cart}">Cart</a>

            <a class="btn btn-light btn-sm"
               sec:authorize="hasRole('CUSTOMER')"
               th:href="@{/user/dashboard}">Dashboard</a>

            <a class="btn btn-light btn-sm"
               sec:authorize="isAnonymous()"
               th:href="@{/auth/login(role='customer', next='/user/packages')}">Login</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">

            <div class="filter-bar">
                <p class="filter-title">
                    Showing Category:
                    <strong th:text="${selectedCategory}">All</strong>
                </p>

                <form th:action="@{/user/packages}" method="get" class="filter-form">
                    <select name="category" class="filter-select">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.name}"
                                th:text="${cat.name}"
                                th:selected="${selectedCategory == cat.name}">
                        </option>
                    </select>
                    <button type="submit" class="btn btn-primary btn-sm">Filter</button>
                    <a th:href="@{/user/packages}" class="btn btn-light btn-sm">Reset</a>
                </form>
            </div>

            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Description / Includes</th>
                    <th class="text-end">Price (LKR)</th>
                    <th style="width:160px;">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(packages)}">
                    <td colspan="5" class="empty-message">
                        No packages found for the selected category.
                    </td>
                </tr>

                <tr th:each="p : ${packages}">
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.category}"></td>
                    <td>
                        <div th:text="${p.description}"></div>

                        <ul class="package-includes mt-2 mb-0"
                            th:if="${p.includes != null and !#strings.isEmpty(p.includes)}">
                            <li th:each="item : ${#strings.arraySplit(p.includes, ',')}"
                                th:text="${#strings.trim(item)}"></li>
                        </ul>
                    </td>
                    <td class="text-end">
                        LKR <span th:text="${#numbers.formatDecimal(p.price, 1, 'COMMA', 2, 'POINT')}"></span>
                    </td>
                    <td>
                        <form sec:authorize="hasRole('CUSTOMER')"
                              th:action="@{/user/cart/add/{id}(id=${p.id})}"
                              method="post"
                              class="d-inline">
                            <button type="submit" class="btn btn-sm btn-success">Add to Cart</button>
                        </form>

                        <a sec:authorize="isAnonymous()"
                           class="btn btn-sm btn-success"
                           th:href="@{/auth/login(role='customer', next='/user/packages')}">
                            Login to Select
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
