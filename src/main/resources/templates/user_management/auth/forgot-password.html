<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FFF8F3;
            font-family: sans-serif;
            min-height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .shell {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 500;
            color: #111;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            color: #888;
            line-height: 1.5;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 1rem;
        }

        .alert.error {
            background: #FEF0E4;
            color: #A0521A;
            border: 0.5px solid #F5DFC8;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            font-size: 13px;
            font-weight: 700;
            color: #888;
            text-decoration: none;
        }

        .back-link:hover {
            color: #111;
        }

        .role-card {
            background: #fff;
            border: 0.5px solid #F5DFC8;
            border-top: 3px solid #E8873A;
            border-radius: 12px;
            padding: 1.5rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 3px 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #FEF0E4;
            color: #A0521A;
        }

        .role-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
            margin-bottom: 4px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
            margin-top: 14px;
        }

        input[type="email"] {
            width: 100%;
            padding: 9px 12px;
            font-size: 14px;
            background: #fff;
            border: 0.5px solid #F0D0B0;
            border-radius: 8px;
            color: #111;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="email"]:focus {
            border-color: #E8873A;
            box-shadow: 0 0 0 3px rgba(232, 135, 58, 0.1);
        }

        .btn-customer {
            display: block;
            width: 100%;
            margin-top: 1.25rem;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            background: #E8873A;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-customer:hover {
            background: #C96D25;
        }

        .hint-box {
            background: #FFF8F3;
            border: 0.5px solid #F5DFC8;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 1rem;
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }

        .links {
            text-align: center;
            margin-top: 1rem;
            font-size: 13px;
            color: #888;
        }

        .links a {
            color: #C96D25;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shell">

        <div class="header">
            <h1>Forgot Password</h1>
            <p>Enter your registered email to reset your password.</p>
        </div>

        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <a th:href="@{/auth/login(role='customer', view='customer')}" class="back-link">
            ← Back to Login
        </a>

        <div class="role-card">
            <span class="badge">👤 CUSTOMER</span>
            <div class="role-title">Password Reset</div>

            <form th:action="@{/auth/forgot-password}" method="post">
                <label>Email</label>
                <input type="email" name="email" required placeholder="you@example.com" title="Enter a valid email">

                <button class="btn-customer" type="submit">Continue</button>
            </form>

            <div class="hint-box">
                <p>You will be redirected to set a new password immediately.</p>
            </div>
        </div>

        <div class="links">
            Remembered it? <a th:href="@{/auth/login(role='customer', view='customer')}">Sign in instead</a>
        </div>

    </div>
</div>

</body>
</html>
