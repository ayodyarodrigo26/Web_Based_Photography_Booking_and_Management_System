<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FFF8F3;
            font-family: sans-serif;
            min-height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .shell {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 500;
            color: #111;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            color: #888;
            line-height: 1.5;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 1rem;
            background: #FEF0E4;
            color: #A0521A;
            border: 0.5px solid #F5DFC8;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            font-size: 13px;
            font-weight: 700;
            color: #888;
            text-decoration: none;
        }

        .back-link:hover { color: #111; }

        .role-card {
            background: #fff;
            border: 0.5px solid #F5DFC8;
            border-top: 3px solid #E8873A;
            border-radius: 12px;
            padding: 1.5rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 3px 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #FEF0E4;
            color: #A0521A;
        }

        .role-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
            margin-bottom: 4px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
            margin-top: 14px;
        }

        .input-wrap { position: relative; width: 100%; }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 9px 38px 9px 12px;
            font-size: 14px;
            background: #fff;
            border: 0.5px solid #F0D0B0;
            border-radius: 8px;
            color: #111;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: #E8873A;
            box-shadow: 0 0 0 3px rgba(232,135,58,0.1);
        }

        .toggle-eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 15px;
        }

        .strength-bar-wrap { display: flex; gap: 4px; margin-top: 8px; }
        .strength-bar-wrap .bar {
            height: 4px;
            flex: 1;
            border-radius: 2px;
            background: #F0D0B0;
            transition: background 0.2s;
        }

        .strength-label { font-size: 12px; margin-top: 5px; color: #888; }

        .btn-customer {
            display: block;
            width: 100%;
            margin-top: 1.25rem;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            background: #E8873A;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-customer:hover { background: #C96D25; }

        .hint-box {
            background: #FFF8F3;
            border: 0.5px solid #F5DFC8;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 1rem;
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }

        .links {
            text-align: center;
            margin-top: 1rem;
            font-size: 13px;
            color: #888;
        }

        .links a {
            color: #C96D25;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shell">

        <div class="header">
            <h1>Reset Password</h1>
            <p>Choose a strong new password for your account.</p>
        </div>

        <div class="alert" th:if="${error}" th:text="${error}"></div>
        <div class="alert" th:if="${param.error}">❌ Invalid or expired reset link.</div>

        <a th:href="@{/auth/login(role='customer', view='customer')}" class="back-link">
            ← Back to Login
        </a>

        <div class="role-card">
            <span class="badge">👤 CUSTOMER</span>
            <div class="role-title">Set New Password</div>

            <form th:action="@{/auth/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <label>New Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" id="newPassword"
                           placeholder="Enter new password" required
                           oninput="checkStrength(this.value)">
                    <span class="toggle-eye" onclick="togglePassword('newPassword')">👁️</span>
                </div>
                <div class="strength-bar-wrap">
                    <div class="bar" id="b1"></div>
                    <div class="bar" id="b2"></div>
                    <div class="bar" id="b3"></div>
                    <div class="bar" id="b4"></div>
                </div>
                <div class="strength-label" id="strengthLabel">Enter a password</div>

                <label>Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" name="confirmPassword" id="confirmPassword"
                           placeholder="Re-enter new password" required>
                    <span class="toggle-eye" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>

                <button class="btn-customer" type="submit">Update Password</button>
            </form>

            <div class="hint-box">
                Use at least 8 characters with a mix of letters, numbers, and symbols for a strong password.
            </div>
        </div>

        <div class="links">
            Remembered it? <a th:href="@{/auth/login(role='customer', view='customer')}">Sign in instead</a>
        </div>

    </div>
</div>

<script>
    function togglePassword(id) {
        const f = document.getElementById(id);
        f.type = f.type === 'password' ? 'text' : 'password';
    }

    function checkStrength(val) {
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colors = ['#E24B4A', '#EF9F27', '#1D9E75', '#0F6E56'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];
        ['b1','b2','b3','b4'].forEach((id, i) => {
            document.getElementById(id).style.background = i < score ? colors[score - 1] : '#F0D0B0';
        });
        const label = document.getElementById('strengthLabel');
        label.textContent = val.length === 0 ? 'Enter a password' : (labels[score - 1] || 'Weak');
        label.style.color = val.length === 0 ? '#888' : (colors[score - 1] || '#E24B4A');
    }
</script>

</body>
</html>
