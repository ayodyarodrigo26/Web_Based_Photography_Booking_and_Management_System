<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feedback Access | Studio CISRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --wine:      #5c0a14;
            --crimson:   #8b1a2a;
            --crimson-lt:#b03040;
            --rose-lt:   #fbeaec;
            --dark:      #1a0608;
            --muted:     #6b3a40;
            --border:    #e8d0d3;
            --ff-serif:  'Cormorant Garamond', Georgia, serif;
            --ff-sans:   'Montserrat', sans-serif;
        }

        html, body { height: 100%; }

        body {
            font-family: var(--ff-sans);
            background: #f9eaec;
            color: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                    radial-gradient(ellipse 70% 60% at 15% 20%, rgba(176,48,64,.18) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 70% at 88% 85%, rgba(139,26,42,.15) 0%, transparent 55%),
                    radial-gradient(ellipse 80% 50% at 50% 50%, rgba(220,180,185,.25) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        .ghost-text {
            position: fixed;
            font-family: var(--ff-serif);
            font-size: 32vw; font-weight: 300;
            color: rgba(139,26,42,.035);
            letter-spacing: -.02em;
            white-space: nowrap;
            user-select: none; pointer-events: none;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: ghostDrift 14s ease-in-out infinite alternate;
        }
        @keyframes ghostDrift {
            from { transform: translate(-50%,-50%) scale(1); }
            to   { transform: translate(-50%,-52%) scale(1.04); }
        }

        .corner { position: fixed; z-index: 0; pointer-events: none; }
        .corner-tl { top: 2rem; left: 2rem; }
        .corner-br { bottom: 2rem; right: 2rem; transform: rotate(180deg); }

        .card {
            position: relative; z-index: 1;
            max-width: 560px; width: 94%;
            background: #ffffff;
            border: 1px solid var(--border);
            border-top: 3px solid var(--crimson);
            border-radius: 4px;
            box-shadow:
                    0 8px 40px rgba(139,26,42,.1),
                    0 2px 8px rgba(139,26,42,.06);
            padding: 2.8rem 3rem;
            animation: cardReveal .85s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(32px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .error-badge {
            width: 52px; height: 52px;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            animation: badgePulse 3s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(139,26,42,0); }
            50%      { box-shadow: 0 0 0 12px rgba(139,26,42,.07); }
        }
        .error-badge svg {
            color: var(--crimson);
            animation: iconShake .5s .8s ease-in-out;
        }
        @keyframes iconShake {
            0%,100% { transform: rotate(0); }
            20%     { transform: rotate(-9deg); }
            40%     { transform: rotate(9deg); }
            60%     { transform: rotate(-5deg); }
            80%     { transform: rotate(5deg); }
        }

        .error-title {
            font-family: var(--ff-serif);
            font-size: 2.2rem; font-weight: 400; line-height: 1.1;
            color: var(--dark);
            opacity: 0; animation: fadeUp .7s .35s forwards;
        }
        .error-title em { font-style: italic; color: var(--crimson); }

        .divider {
            display: flex; align-items: center; gap: .8rem;
            margin: 1.2rem 0;
            opacity: 0; animation: fadeUp .6s .5s forwards;
        }
        .div-line { flex: 1; height: 1px; background: var(--border); }
        .div-gem {
            width: 5px; height: 5px;
            background: var(--crimson-lt);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        .error-message {
            font-size: .95rem; line-height: 1.9;
            color: #4a1820;
            margin-bottom: 1.4rem;
            opacity: 0; animation: fadeUp .7s .6s forwards;
        }

        .alert-box {
            background: var(--rose-lt);
            border: 1px solid var(--border);
            border-left: 3px solid var(--crimson);
            border-radius: 2px;
            padding: .85rem 1.2rem;
            font-size: .85rem;
            color: var(--wine);
            margin-bottom: 1.8rem;
            opacity: 0; animation: fadeUp .6s .65s forwards;
        }

        .links-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1rem;
            opacity: 0; animation: fadeUp .6s .75s forwards;
        }

        .btn-home {
            display: inline-block; text-decoration: none;
            font-family: var(--ff-sans); font-size: .72rem;
            font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
            padding: .9rem 2.4rem;
            background: var(--crimson);
            color: #ffffff;
            border-radius: 2px;
            position: relative; overflow: hidden;
            transition: transform .3s;
        }
        .btn-home::before {
            content: '';
            position: absolute; inset: 0;
            background: var(--wine);
            transform: translateX(-100%);
            transition: transform .4s cubic-bezier(.77,0,.175,1);
        }
        .btn-home:hover { transform: translateY(-2px); }
        .btn-home:hover::before { transform: translateX(0); }
        .btn-home span { position: relative; z-index: 1; }

        .back-link {
            font-size: .78rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: .06em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1px;
            transition: color .2s, border-color .2s;
        }
        .back-link:hover { color: var(--crimson); border-color: var(--crimson-lt); }

        .brand-label {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            font-family: var(--ff-serif); font-size: .8rem; letter-spacing: .38em;
            color: rgba(92,10,20,.22); white-space: nowrap; z-index: 1;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; }
            .error-title { font-size: 1.8rem; }
            .btn-home { display: block; text-align: center; }
            .links-row { align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="ghost-text">403</div>

<div class="corner corner-tl">
    <svg width="44" height="44" fill="none" viewBox="0 0 44 44" opacity=".2">
        <path d="M2 42 L2 2 L42 2" stroke="#8b1a2a" stroke-width="1.5"/>
    </svg>
</div>
<div class="corner corner-br">
    <svg width="44" height="44" fill="none" viewBox="0 0 44 44" opacity=".2">
        <path d="M2 42 L2 2 L42 2" stroke="#8b1a2a" stroke-width="1.5"/>
    </svg>
</div>

<div class="card">

    <div class="icon-row">
        <div class="error-badge">
            <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12.5"/>
                <circle cx="12" cy="16" r=".9" fill="currentColor" stroke="none"/>
            </svg>
        </div>
        <h1 class="error-title">Feedback <em>Access Restricted</em></h1>
    </div>

    <div class="divider">
        <div class="div-line"></div>
        <div class="div-gem"></div>
        <div class="div-line"></div>
    </div>

    <p class="error-message">
        Feedback submission is available only for eligible customer accounts.
    </p>

    <div class="alert-box">
        <span th:text="${message}">Only customers can add feedback.</span>
    </div>

    <div class="links-row">
        <a th:href="@{/auth/login}" href="/auth/login" class="btn-home">
            <span>Login as Customer</span>
        </a>

        <!-- NEW HOME BUTTON -->
        <a th:href="@{/}" href="/" class="btn-home">
            <span>Back to Home</span>
        </a>

        <a th:href="@{/feedback/list}" href="/feedback/list" class="back-link">
            ← Back to Feedback List
        </a>
    </div>

</div>

<div class="brand-label">STUDIO CISRA</div>

</body>
</html>
